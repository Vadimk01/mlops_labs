name: Airflow CI

on:
  push:
  pull_request:

jobs:
  dag-and-docker-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install apache-airflow==2.9.3 --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"
          pip install -r requirements.txt

      - name: Lint Python files
        run: |
          pip install flake8
          flake8 dags src --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: DAG integrity test
        run: |
          python -c "from airflow.models import DagBag; dagbag = DagBag(dag_folder='dags', include_examples=False); assert len(dagbag.import_errors) == 0, dagbag.import_errors; assert 'ml_training_pipeline' in dagbag.dags"

      - name: Build Docker image
        run: |
          docker build -t mlops-lab5 .